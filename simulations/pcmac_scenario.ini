[General]
network           = HighwayPCMAC
sim-time-limit    = 1000s
repeat            = 5
**.scalar-recording = true
**.vector-recording = true

# ── SUMO / TraCI ────────────────────────────────────────────────────────
*.manager.updateInterval  = 0.1s
*.manager.launchConfig    = xmldoc("sumo.launch.xml")
*.manager.moduleType      = "pcmac.PCMACVehicleApp"
*.manager.moduleName      = "node"

# ── MAC — IEEE 802.11p parameters as specified in paper ─────────────────
*.**.nic.mac1609_4.useServiceChannel = false
*.**.nic.mac1609_4.txPower    = 20mW
*.**.nic.mac1609_4.bitrate    = 6Mbps
*.**.nic.mac1609_4.useAcks   = false   # broadcast mode

# ── PHY — 802.11p physical layer ──────────────────────────────────────
*.**.nic.phy80211p.minPowerLevel = -94dBm
*.**.nic.phy80211p.maxTXPower = 100mW
*.**.nic.phy80211p.useNoiseFloor = true
*.**.nic.phy80211p.noiseFloor = -95dBm
*.**.nic.phy80211p.decider = xmldoc("config.xml")
*.**.nic.phy80211p.analogueModels = xmldoc("config.xml")
*.**.nic.phy80211p.usePropagationDelay = true

# ── Application layer ────────────────────────────────────────────────────
*.node[*].appl.beaconInterval      = 0.1s   # 100ms beacon period
*.node[*].appl.beaconUserPriority  = 7      # AC_VO for safety beacons
*.rsu[*].appl.beaconInterval       = 0.05s  # 50ms RSU CCH broadcast interval

# ── Annotations / world ─────────────────────────────────────────────────
*.annotations.draw = false
*.world.useTorus = false
*.world.use2D = false

# ── RSU mobility (fixed position) ───────────────────────────────────────
*.rsu[*].mobility.x = 500
*.rsu[*].mobility.y = 5
*.rsu[*].mobility.z = 3

*.playgroundSizeX = 10000m
*.playgroundSizeY = 10000m
*.playgroundSizeZ = 50m

*.traffic_type = "PlatoonsTrafficManager"
*.traffic.controller = "CACC"
*.traffic.platoonInsertTime = 1s
*.traffic.platoonInsertSpeed = 100kmph
*.traffic.platoonInsertDistance = 5m
*.traffic.platoonInsertHeadway = 0.3s
*.traffic.platoonLeaderHeadway = 1.2s
*.traffic.platoonSize = 3
*.traffic.nPlatoons = 1
*.traffic.nLanes = 1
*.traffic.nCars = 3
*.traffic.platooningVType = "vtypeauto"
# ════════════════════════════════════════════════════════════════════════

[Config NoRIS]
description = "PCMAC without RIS — baseline matching paper results"
**.numRis = 0

[Config WithRIS]
description = "PCMAC with RIS — two panels at mid-highway roadside"
**.numRis = 2
*.ris[0].mobility.x = 300
*.ris[0].mobility.y = 10
*.ris[1].mobility.x = 700
*.ris[1].mobility.y = 10

# ════════════════════════════════════════════════════════════════════════
# Vehicle Count Sweep — matches paper N=5..50
# Combine with NoRIS or WithRIS: e.g. run -c NoRIS -r 0 --num-vehicles=20
# ════════════════════════════════════════════════════════════════════════

[Config N5]
**.numVehicles = 5

[Config N10]
**.numVehicles = 10

[Config N20]
**.numVehicles = 20

[Config N30]
**.numVehicles = 30

[Config N40]
**.numVehicles = 40

[Config N50]
**.numVehicles = 50

# ════════════════════════════════════════════════════════════════════════
# Emergency Message Fraction Sweep
# ════════════════════════════════════════════════════════════════════════

[Config Emerg20]
*.node[*].appl.emergencyFraction = 0.2

[Config Emerg50]
*.node[*].appl.emergencyFraction = 0.5

[Config Emerg80]
*.node[*].appl.emergencyFraction = 0.8

[Config Emerg100]
*.node[*].appl.emergencyFraction = 1.0

# ════════════════════════════════════════════════════════════════════════
# Static Mobility Test — no SUMO required, runs in ~10 seconds
# Use this to verify PCMAC logic, message flow, and MAC interface
# before running any full SUMO simulation.
# Run with: opp_run -m -u Cmdenv -c StaticTest simulations/pcmac_scenario.ini
# ════════════════════════════════════════════════════════════════════════

[Config StaticTest]
description = "Static mobility test — no SUMO needed"

# Disable TraCI manager and traffic manager — no SUMO needed
HighwayPCMAC.useManager = false
HighwayPCMAC.useTraffic = false

# Place 3 vehicles at fixed positions 20m apart along x-axis
*.node[*].veinsmobilityType   = "org.car2x.veins.base.modules.BaseMobility"
*.node[0].veinsmobility.x   = 0
*.node[0].veinsmobility.y   = 0
*.node[1].veinsmobility.x   = 20
*.node[1].veinsmobility.y   = 0
*.node[2].veinsmobility.x   = 40
*.node[2].veinsmobility.y   = 0
*.node[*].veinsmobility.z   = 1.895

# Fixed speed since TraCI is disabled
*.node[*].appl.fixedSpeed     = 27.78    # 100 km/h in m/s

# Small platoon — enough to exercise priority calculation
**.numVehicles    = 3
sim-time-limit    = 10s

*.playgroundSizeX = 10000m
*.playgroundSizeY = 10000m
*.playgroundSizeZ = 50m

*.connectionManager.sendDirect = true
*.connectionManager.maxInterfDist = 2600m
# ════════════════════════════════════════════════════════════════════════
# IEEE 802.11p baseline configs — disables PCMAC CW adaptation
# Vehicle still sends emergency messages but uses standard fixed CW
# ════════════════════════════════════════════════════════════════════════

[Config IEEE80211p_NoRIS]
description = "Standard IEEE 802.11p without RIS — paper baseline"
**.numRis = 0
*.node[*].appl.usePCMAC = false   # disables setPCMACContWindow() calls

[Config IEEE80211p_WithRIS]
description = "Standard IEEE 802.11p with RIS"
**.numRis = 2
*.ris[0].mobility.x = 300
*.ris[0].mobility.y = 10
*.ris[1].mobility.x = 700
*.ris[1].mobility.y = 10
*.node[*].appl.usePCMAC = false
